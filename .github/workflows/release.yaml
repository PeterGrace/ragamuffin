name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build and release (e.g. v0.1.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Every target builds natively on a matching-architecture runner, so
          # no cross-compilation is needed. GitHub provides free arm64 Linux
          # runners (`ubuntu-24.04-arm`) for public repositories.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name: ragamuffin-x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            asset_name: ragamuffin-aarch64-unknown-linux-gnu
          - target: x86_64-apple-darwin
            os: macos-latest
            asset_name: ragamuffin-x86_64-apple-darwin
          - target: aarch64-apple-darwin
            os: macos-latest
            asset_name: ragamuffin-aarch64-apple-darwin
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset_name: ragamuffin-x86_64-pc-windows-msvc
          - target: aarch64-pc-windows-msvc
            os: windows-11-arm
            asset_name: ragamuffin-aarch64-pc-windows-msvc
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target=${{ matrix.target }}

      - name: Rename binary
        shell: bash
        # Windows binaries carry a `.exe` suffix; copy with it when present so
        # the released asset keeps a runnable extension.
        run: |
          bin="target/${{ matrix.target }}/release/ragamuffin"
          if [ -f "${bin}.exe" ]; then
            cp "${bin}.exe" "${{ matrix.asset_name }}.exe"
          else
            cp "${bin}" "${{ matrix.asset_name }}"
          fi

      - name: Ad-hoc sign (macOS)
        if: runner.os == 'macOS'
        run: codesign --sign - --force ${{ matrix.asset_name }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: |
            ragamuffin-*
