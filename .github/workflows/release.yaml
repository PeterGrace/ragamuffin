name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
            asset_name: ragamuffin-x86_64-unknown-linux-gnu
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
            asset_name: ragamuffin-aarch64-unknown-linux-gnu
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
            asset_name: ragamuffin-x86_64-apple-darwin
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
            asset_name: ragamuffin-aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross

      - name: Build (native)
        if: matrix.use_cross == false
        run: cargo build --release --target=${{ matrix.target }}

      - name: Build (cross)
        if: matrix.use_cross == true
        run: cross build --release --target=${{ matrix.target }}

      - name: Rename binary
        shell: bash
        run: cp target/${{ matrix.target }}/release/ragamuffin ${{ matrix.asset_name }}

      - name: Ad-hoc sign (macOS)
        if: runner.os == 'macOS'
        run: codesign --sign - --force ${{ matrix.asset_name }}

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ragamuffin-*
